name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: server-npm-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-npm-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-v7

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: client-npm-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-npm-

      - run: npm ci
      - run: npm run lint
      - run: npm run build
