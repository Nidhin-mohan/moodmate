name: CD Backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "docker-compose.prod.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_ECR }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:${{ github.sha }} -f server/Dockerfile server/
          docker tag ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:${{ github.sha }} ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:${{ github.sha }}
          docker push ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:latest
        name: Build and push Docker image

      - uses: appleboy/scp-action@v0.1.7
        name: Copy docker-compose.prod.yml to EC2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/ubuntu/moodmate/

      - uses: appleboy/ssh-action@v1
        name: Deploy to EC2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_IMAGE
          script: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            cd /home/ubuntu/moodmate
            ECR_IMAGE=$ECR_IMAGE docker compose -f docker-compose.prod.yml up -d --pull always
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_IMAGE: ${{ steps.ecr-login.outputs.registry }}/moodmate-backend:latest
