services:
  backend:
    image: ${ECR_IMAGE:-moodmate-backend:latest}
    container_name: moodmate-backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
